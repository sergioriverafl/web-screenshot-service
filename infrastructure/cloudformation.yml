AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Web Screenshot Service

Parameters:
  BucketName:
    Type: String
    Description: Nombre del bucket S3 para almacenar capturas
    Default: web-screenshots-bucket

  LambdaFunctionName:
    Type: String
    Default: screenshot-processor

Resources:
  # ─── S3 Bucket ───────────────────────────────────────────
  ScreenshotsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldScreenshots
            Status: Enabled
            ExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET]
            MaxAge: 3600

  # ─── IAM Role para Lambda ─────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ScreenshotLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3WritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${BucketName}/*'

  # ─── Lambda Function ──────────────────────────────────────
  ScreenshotLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 2048
      Timeout: 60
      Environment:
        Variables:
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Code:
        ZipFile: |
          exports.handler = async () => ({ status: 'placeholder' });

Outputs:
  BucketName:
    Value: !Ref ScreenshotsBucket
    Description: Nombre del bucket S3

  LambdaArn:
    Value: !GetAtt ScreenshotLambda.Arn
    Description: ARN de la función Lambda
